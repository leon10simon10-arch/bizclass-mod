name: Build Mod Jar

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Locate the Gradle project root
        id: locate
        run: |
          SETTINGS_FILE=$(find . -maxdepth 4 -name "settings.gradle" | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle anywhere in the repo (searched 4 folders deep)." >&2
            find . -maxdepth 3 -type d >&2
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Found Gradle project at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper if missing
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: |
          if [ ! -f "./gradlew" ]; then
            sudo apt-get update && sudo apt-get install -y gradle
            gradle wrapper --gradle-version 8.8
            chmod +x ./gradlew
          fi

      - name: Build with Gradle
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: bizclass-mod-jar
          path: "${{ steps.locate.outputs.project_dir }}/build/libs/*.jar"
